<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>공사명칭 검토기</title>
<style>
:root{--bg:#f5f6fa;--card:#fff;--border:#e0e3eb;--text:#23272f;--sub:#6b7280;--blue:#2563eb;--red:#dc2626;--green:#16a34a;--orange:#ea580c}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Pretendard',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
.header{background:#1e293b;color:#fff;padding:14px 24px;display:flex;align-items:center;gap:12px}
.header h1{font-size:20px;font-weight:700}
.header span{font-size:13px;color:#94a3b8}
.container{max-width:1200px;margin:0 auto;padding:20px}
.upload-zone{border:2px dashed var(--border);border-radius:12px;padding:32px;text-align:center;background:var(--card);cursor:pointer;transition:.2s}
.upload-zone.dragover{border-color:var(--blue);background:#eff6ff}
.upload-zone p{color:var(--sub);margin-top:8px;font-size:14px}
.file-list{margin-top:16px;display:flex;flex-direction:column;gap:6px}
.file-item{display:flex;align-items:center;justify-content:space-between;background:var(--card);border:1px solid var(--border);border-radius:8px;padding:8px 14px;font-size:14px}
.file-item .name{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.file-item .status{font-size:12px;margin:0 10px;color:var(--sub);min-width:80px;text-align:right}
.file-item .status.done{color:var(--green);font-weight:600}
.file-item .status.error{color:var(--red);font-weight:600}
.file-item .status.running{color:var(--blue);font-weight:600}
.file-item .remove{cursor:pointer;color:var(--red);font-size:16px;padding:0 4px}
.file-item .remove:hover{opacity:.7}
.btn-group{margin-top:16px;display:flex;gap:10px;flex-wrap:wrap;justify-content:center}
.btn{padding:10px 20px;border:none;border-radius:8px;font-size:14px;font-weight:600;cursor:pointer;transition:.15s}
.btn:hover{opacity:.85}
.btn-primary{background:var(--blue);color:#fff}
.btn-danger{background:var(--red);color:#fff}
.btn-secondary{background:#e2e8f0;color:var(--text)}
.btn-green{background:var(--green);color:#fff}
.btn:disabled{opacity:.4;cursor:not-allowed}
.status-bar{margin-top:16px;font-size:14px;color:var(--sub);min-height:20px;text-align:center}
.total-summary{margin-top:16px;display:flex;gap:12px;flex-wrap:wrap;justify-content:center}
.total-card{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:14px 20px;text-align:center;min-width:100px}
.total-card .num{font-size:28px;font-weight:800}
.total-card .label{font-size:12px;color:var(--sub);margin-top:2px}
.file-result{margin-top:20px;background:var(--card);border:1px solid var(--border);border-radius:10px;overflow:hidden}
.file-result-header{padding:12px 16px;background:#f8fafc;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;cursor:pointer}
.file-result-header h3{font-size:15px;font-weight:600}
.file-result-header .badge{font-size:12px;padding:3px 10px;border-radius:20px;font-weight:600}
.badge-ok{background:#dcfce7;color:var(--green)}
.badge-ng{background:#fef2f2;color:var(--red)}
.badge-err{background:#fef3c7;color:var(--orange)}
.file-result-body{padding:0;display:none}
.file-result-body.open{display:block}
.result-summary{display:flex;gap:10px;padding:12px 16px;flex-wrap:wrap}
.summary-chip{font-size:13px;padding:4px 12px;border-radius:6px;background:#f1f5f9}
.summary-chip b{font-weight:700}
.result-table{width:100%;border-collapse:collapse;font-size:13px}
.result-table th{background:#f8fafc;padding:8px 12px;text-align:left;border-bottom:2px solid var(--border);white-space:nowrap}
.result-table td{padding:8px 12px;border-bottom:1px solid var(--border);vertical-align:top}
.result-table tr:hover{background:#fafbfc}
.st-mismatch{color:var(--red);font-weight:600}
.snapshot-section{margin-top:20px;display:none}
.snapshot-section img{width:100%;border:1px solid var(--border);border-radius:8px;margin-top:10px}
/* 프로그레스 바 */
.progress-wrap{margin-top:24px;display:none;text-align:center;background:var(--card);border:1px solid var(--border);border-radius:14px;padding:30px 24px}
.progress-bar{width:100%;height:12px;background:#e2e8f0;border-radius:6px;overflow:hidden}
.progress-fill{height:100%;background:linear-gradient(90deg,#2563eb,#06b6d4);border-radius:6px;transition:width .3s;width:0%}
.progress-counter{font-size:42px;font-weight:800;color:var(--blue);margin-bottom:8px}
.progress-filename{font-size:16px;color:var(--text);font-weight:600;margin-bottom:16px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.progress-pct{font-size:14px;color:var(--sub);margin-top:8px}
/* 검토중 파일 애니메이션 */
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.file-item.reviewing{background:#eff6ff;border-color:var(--blue)}
.file-item.reviewing .status{animation:pulse 1.2s infinite}

/* ── 중앙 모래시계 아이콘 ── */
.center-hourglass {
  display: none;
  text-align: center;
  margin: 12px auto 4px auto;
  font-size: 48px;
  animation: hg-flip 1.2s ease-in-out infinite;
}
.center-hourglass.active { display: block; }
@keyframes hg-flip {
  0%   { transform: rotate(0deg);   opacity: 1; }
  50%  { transform: rotate(180deg); opacity: 0.6; }
  100% { transform: rotate(360deg); opacity: 1; }
}

</style>
<link rel="icon" href="/app_icon.ico" type="image/x-icon">
<link rel="apple-touch-icon" href="/app_icon.png">
</head>
<body>
<div class="header">
  <img src="/app_icon.png" alt="logo" style="width:32px;height:32px;border-radius:6px"><h1>공사명칭 검토기</h1>
  <span>v4.0 — 마스터 역방향 스캔</span>
</div>
<div class="container">
  <div class="upload-zone" id="dropZone">
    <div style="font-size:36px">📂</div>
    <p>파일을 드래그하거나 클릭하여 업로드</p>
    <p style="font-size:12px;color:#94a3b8">PDF · Excel · Word · HWP · CSV (다중 선택 가능)</p>
    <input type="file" id="fileInput" multiple accept=".pdf,.xlsx,.xls,.docx,.hwp,.hwpx,.csv" hidden>
  </div>
  <div class="file-list" id="fileList"></div>
  <div class="btn-group">
    <button class="btn btn-primary" id="btnStart" disabled>검토 시작</button>
    <button class="btn btn-green" id="btnExcel" disabled>Excel 다운로드</button>
    <button class="btn btn-secondary" id="btnSnapshot" disabled>스냅샷 보기</button>
    <button class="btn btn-danger" id="btnClear" disabled>초기화</button>
  </div>
  <div class="progress-wrap" id="progressWrap">
    <div class="progress-counter" id="progressCounter">1 / 2</div>
    <div class="progress-filename" id="progressFilename">파일명</div>
    <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
    <div class="progress-pct" id="progressPct">0%</div>
<div id="centerHourglass" class="center-hourglass">⏳</div>

  </div>
  <div class="status-bar" id="statusBar"></div>
  <div class="total-summary" id="totalSummary"></div>
  <div id="resultsArea"></div>
  <div class="snapshot-section" id="snapshotArea"></div>
</div>
<script>
const $=id=>document.getElementById(id);
const dropZone=$('dropZone'),fileInput=$('fileInput'),fileList=$('fileList');
const btnStart=$('btnStart'),btnExcel=$('btnExcel'),btnSnapshot=$('btnSnapshot'),btnClear=$('btnClear');
const statusBar=$('statusBar'),totalSummary=$('totalSummary'),resultsArea=$('resultsArea'),snapshotArea=$('snapshotArea');
const progressWrap=$('progressWrap'),progressFill=$('progressFill');

let files=[],allResults=[],allSnapshots=[];

dropZone.addEventListener('click',()=>fileInput.click());
dropZone.addEventListener('dragover',e=>{e.preventDefault();dropZone.classList.add('dragover')});
dropZone.addEventListener('dragleave',()=>dropZone.classList.remove('dragover'));
dropZone.addEventListener('drop',e=>{e.preventDefault();dropZone.classList.remove('dragover');addFiles(e.dataTransfer.files)});
fileInput.addEventListener('change',e=>{addFiles(e.target.files);fileInput.value=''});

function addFiles(nf){
  for(const f of nf){
    if(!files.find(x=>x.name===f.name&&x.size===f.size))files.push(f);
  }
  renderFileList();updateBtns();
}
function removeFile(i){files.splice(i,1);renderFileList();updateBtns()}
function renderFileList(){
  fileList.innerHTML='';
  files.forEach((f,i)=>{
    const d=document.createElement('div');d.className='file-item';d.id='fitem_'+i;
    d.innerHTML=`<span class="name">${f.name}</span><span class="status" id="fs_${i}">대기</span><span class="remove" onclick="removeFile(${i})">✕</span>`;
    fileList.appendChild(d);
  });
}
function updateBtns(){
  btnStart.disabled=files.length===0;
  btnClear.disabled=files.length===0&&allResults.length===0;
}

btnClear.addEventListener('click',()=>{
  files=[];allResults=[];allSnapshots=[];
  fileList.innerHTML='';statusBar.textContent='';
  totalSummary.innerHTML='';resultsArea.innerHTML='';snapshotArea.innerHTML='';snapshotArea.style.display='none';
  btnExcel.disabled=true;btnSnapshot.disabled=true;btnSnapshot.textContent='스냅샷 보기';
  var hgEl=document.getElementById('centerHourglass');if(hgEl)hgEl.classList.remove('active');
  progressWrap.style.display='none';updateBtns();
});

btnStart.addEventListener('click',async()=>{
  if(!files.length)return;
  allResults=[];allSnapshots=[];
  resultsArea.innerHTML='';totalSummary.innerHTML='';snapshotArea.innerHTML='';snapshotArea.style.display='none';
  btnStart.disabled=true;btnExcel.disabled=true;btnSnapshot.disabled=true;
  progressWrap.style.display='block';progressFill.style.width='0%';

  const t0=Date.now();
  let tT=0,tM=0,tMM=0,tW=0;

  for(let i=0;i<files.length;i++){
    const f=files[i];
    const fi=$('fitem_'+i),fs=$('fs_'+i);

    var hgEl=document.getElementById('centerHourglass');if(hgEl)hgEl.classList.add('active');
    // 현재 파일 강조
    if(fi)fi.className='file-item reviewing';
    if(fs){fs.textContent='⏳ 검토 중...';fs.className='status running';}
    $('progressCounter').textContent=`${i+1} / ${files.length}`;
    $('progressFilename').textContent=f.name;
    $('progressPct').textContent=Math.round((i/files.length)*100)+'%';
    progressFill.style.width=((i/files.length)*100)+'%';

    try{
      const form=new FormData();form.append('file',f);
      const resp=await fetch('/api/review',{method:'POST',body:form});
      if(!resp.ok)throw new Error('서버 오류 '+resp.status);
      const data=await resp.json();
      data.file=f.name;  // 원본 파일명 보장
      allResults.push(data);
      if(data.snapshots)allSnapshots.push(...data.snapshots);
      tT+=data.total||0;tM+=data.matched||0;tMM+=data.mismatched||0;tW+=data.warning||0;

      if(fi)fi.className='file-item';
      if(fs){
        const mm=data.mismatched||0;
        fs.textContent=mm>0?`불일치 ${mm}건`:'✅ 적합';
        fs.className='status '+(mm>0?'error':'done');
      }
    }catch(err){
      if(fi)fi.className='file-item';
      if(fs){fs.textContent='❌ 오류';fs.className='status error';}
      allResults.push({file:f.name,error:err.message,total:0,matched:0,mismatched:0,warning:0,details:[]});
    }
  }

  const elapsed=((Date.now()-t0)/1000).toFixed(1);
  progressFill.style.width='100%';
  $('progressCounter').textContent='완료!';


  $('progressFilename').textContent=`${files.length}개 파일 검토 완료`;
  $('progressPct').textContent='100%';
  statusBar.textContent=`완료 — ${files.length}개 파일, ${elapsed}초`;

  totalSummary.innerHTML=`
    <div class="total-card"><div class="num">${tT}</div><div class="label">전체</div></div>
    <div class="total-card"><div class="num" style="color:var(--green)">${tM}</div><div class="label">일치</div></div>
    <div class="total-card"><div class="num" style="color:var(--orange)">${tW}</div><div class="label">경고</div></div>
    <div class="total-card"><div class="num" style="color:var(--red)">${tMM}</div><div class="label">불일치</div></div>`;

  allResults.forEach(data=>{
    const mm=data.mismatched||0;
    const details=data.details||[];
    const ngItems=details.filter(d=>d.status!=='일치');
    const hasErr=!!data.error;

    const div=document.createElement('div');div.className='file-result';
    let badge='';
    if(hasErr)badge='<span class="badge badge-err">오류</span>';
    else if(mm>0)badge=`<span class="badge badge-ng">불일치 ${mm}건</span>`;
    else badge='<span class="badge badge-ok">적합</span>';

    let body='';
    if(hasErr){
      body=`<div style="padding:16px;color:var(--red)">${data.error}</div>`;
    }else{
      body=`<div class="result-summary">
        <span class="summary-chip">전체 <b>${data.total||0}</b></span>
        <span class="summary-chip">일치 <b>${data.matched||0}</b></span>
        <span class="summary-chip">경고 <b>${data.warning||0}</b></span>
        <span class="summary-chip">불일치 <b>${mm}</b></span>
        ${data.elapsed?`<span class="summary-chip">${data.elapsed}초</span>`:''}
      </div>`;
      if(ngItems.length>0){
        body+=`<table class="result-table">
          <tr><th>명칭</th><th>위치</th><th>상태</th><th>사유</th></tr>
          ${ngItems.map(it=>`<tr><td>${it.input||''}</td><td>${it.location||''}</td><td class="st-mismatch">${it.status||''}</td><td>${it.issue||''}</td></tr>`).join('')}
        </table>`;
      }
    }

    div.innerHTML=`
      <div class="file-result-header" onclick="this.nextElementSibling.classList.toggle('open')">
        <h3>${data.file||'파일'}</h3>${badge}
      </div>
      <div class="file-result-body${(mm>0||hasErr)?' open':''}">${body}</div>`;
    resultsArea.appendChild(div);
  });

  btnStart.disabled=false;btnExcel.disabled=allResults.length===0;
  btnSnapshot.disabled=allSnapshots.length===0;updateBtns();
  setTimeout(()=>{progressWrap.style.display='none'},2000);
});

btnSnapshot.addEventListener('click',()=>{
  if(snapshotArea.style.display==='block'){
    snapshotArea.style.display='none';btnSnapshot.textContent='스냅샷 보기';return;
  }
  snapshotArea.innerHTML='';
  allSnapshots.forEach(s=>{const img=document.createElement('img');img.src='data:image/png;base64,'+s.image;snapshotArea.appendChild(img)});
  snapshotArea.style.display='block';btnSnapshot.textContent='스냅샷 숨기기';
});

btnExcel.addEventListener('click',async()=>{
  if(!allResults.length){alert('먼저 검토를 실행하세요.');return;}
  for(const r of allResults){
    const f=files.find(x=>x.name===r.file);
    if(!f)continue;
    const form=new FormData();form.append('file',f);
    const resp=await fetch('/api/review/excel',{method:'POST',body:form});
    if(!resp.ok){alert('Excel 생성 실패: '+r.file);continue;}
    const blob=await resp.blob();const url=URL.createObjectURL(blob);
    const a=document.createElement('a');a.href=url;
    a.download='검토결과_'+r.file.replace(/\.[^.]+$/,'')+'.xlsx';
    document.body.appendChild(a);a.click();document.body.removeChild(a);
    URL.revokeObjectURL(url);
  }
});
</script>
</body>
</html>
